window.seedProducts = async function() {
  const btn = document.getElementById("seedBtn");
  const log = document.getElementById("log");
  btn.disabled = true;
  btn.textContent = "⏳ Seeding...";
  log.innerHTML = '<div class="info">Starting seed operation...</div>';

  let success = 0, failed = 0;

  for (const product of PRODUCTS) {
    try {
      const { id, ...data } = product;
      await setDoc(doc(db, "products", id), data);
      log.innerHTML += `<div class="ok">✅ ${product.name}</div>`;
      success++;
    } catch (err) {
      log.innerHTML += `<div class="err">❌ ${product.name}: ${err.message}</div>`;
      failed++;
    }
    log.scrollTop = log.scrollHeight;
    await new Promise(r => setTimeout(r, 200)); // avoid rate limiting
  }

  log.innerHTML += `<div class="info" style="margin-top:.5rem;font-size:.9rem;font-weight:bold">
    ══ Done! ✅ ${success} added · ❌ ${failed} failed ══
    <br/>⚠️ Please DELETE this seed-firestore.html file now!
  </div>`;

  btn.textContent = success === PRODUCTS.length ? "✅ All Done!" : `⚠️ Done (${failed} errors)`;
};
