<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel – AyurLife Naturals</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    a    { text-decoration: none; color: inherit; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #16a34a; border-radius: 4px; }

    /* ══════════════════════════════
       LOGIN SCREEN
    ══════════════════════════════ */
    #login-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #0f172a 0%, #1a2e1a 100%);
      display: flex; align-items: center; justify-content: center; padding: 1.5rem;
    }
    #login-screen.hidden { display: none; }

    .login-card {
      background: #1e293b;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 1.5rem;
      padding: 2.5rem;
      width: 100%; max-width: 400px;
      box-shadow: 0 32px 64px rgba(0,0,0,.4);
    }
    .login-logo {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, #16a34a, #15803d);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin: 0 auto 1.25rem;
      box-shadow: 0 4px 16px rgba(22,163,74,.4);
    }
    .login-title { text-align: center; font-size: 1.4rem; font-weight: 700; color: #f1f5f9; margin-bottom: .25rem; }
    .login-sub   { text-align: center; font-size: .82rem; color: #64748b; margin-bottom: 1.75rem; }

    .inp-group { margin-bottom: 1rem; }
    .inp-label { display: block; font-size: .78rem; font-weight: 600; color: #94a3b8; margin-bottom: .4rem; letter-spacing: .04em; text-transform: uppercase; }
    .inp-wrap  { position: relative; }
    .inp-wrap i { position: absolute; left: .9rem; top: 50%; transform: translateY(-50%); color: #475569; font-size: .85rem; }
    .inp {
      width: 100%; padding: .75rem 1rem .75rem 2.5rem;
      background: #0f172a; border: 1.5px solid #334155;
      border-radius: .75rem; color: #e2e8f0; font-size: .9rem;
      font-family: 'DM Sans', sans-serif;
      transition: border-color .2s, box-shadow .2s; outline: none;
    }
    .inp:focus { border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,.15); }
    .inp.error { border-color: #ef4444; }

    .toggle-pw {
      position: absolute; right: .9rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #475569; cursor: pointer; font-size: .85rem;
      transition: color .2s;
    }
    .toggle-pw:hover { color: #94a3b8; }

    .btn-login {
      width: 100%; padding: .85rem; border-radius: .75rem; border: none;
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: #fff; font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: all .25s; margin-top: .25rem;
      box-shadow: 0 4px 14px rgba(22,163,74,.3);
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(22,163,74,.4); }
    .btn-login:active { transform: translateY(0); }

    .login-error {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5; border-radius: .6rem;
      padding: .6rem .9rem; font-size: .82rem; margin-top: .75rem;
      text-align: center; display: none;
    }
    .login-error.show { display: block; }

    /* ══════════════════════════════
       MAIN ADMIN LAYOUT
    ══════════════════════════════ */
    #admin-app { display: none; }
    #admin-app.visible { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: #1e293b;
      border-right: 1px solid rgba(255,255,255,.06);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; height: 100vh;
      z-index: 100; transition: transform .3s;
    }
    .sidebar-logo {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,.06);
      display: flex; align-items: center; gap: .75rem;
    }
    .sidebar-logo .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    .sidebar-logo .logo-text { font-weight: 700; font-size: .95rem; color: #f1f5f9; line-height: 1.2; }
    .sidebar-logo .logo-sub  { font-size: .68rem; color: #64748b; }

    .sidebar-nav { flex: 1; padding: 1rem .75rem; overflow-y: auto; }
    .nav-section { margin-bottom: 1.5rem; }
    .nav-section-title { font-size: .65rem; font-weight: 700; color: #475569; letter-spacing: .1em; text-transform: uppercase; padding: 0 .75rem; margin-bottom: .5rem; }

    .nav-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .6rem .75rem; border-radius: .6rem; cursor: pointer;
      color: #94a3b8; font-size: .88rem; font-weight: 500;
      transition: background .2s, color .2s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: rgba(255,255,255,.05); color: #e2e8f0; }
    .nav-item.active { background: rgba(22,163,74,.15); color: #4ade80; }
    .nav-item i { width: 16px; text-align: center; font-size: .85rem; }

    .sidebar-footer {
      padding: 1rem .75rem;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .logout-btn {
      display: flex; align-items: center; gap: .75rem;
      padding: .6rem .75rem; border-radius: .6rem; cursor: pointer;
      color: #f87171; font-size: .88rem; font-weight: 500;
      transition: background .2s; border: none; background: none; width: 100%;
    }
    .logout-btn:hover { background: rgba(239,68,68,.1); }

    /* Main content */
    .main-content { margin-left: 240px; flex: 1; padding: 2rem; min-height: 100vh; }

    /* Top bar */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem;
    }
    .topbar-title { font-size: 1.4rem; font-weight: 700; color: #f1f5f9; }
    .topbar-sub   { font-size: .82rem; color: #64748b; margin-top: .15rem; }
    .topbar-right { display: flex; align-items: center; gap: .75rem; }

    .badge-live {
      display: flex; align-items: center; gap: .4rem;
      background: rgba(22,163,74,.15); color: #4ade80;
      border: 1px solid rgba(22,163,74,.3);
      padding: .35rem .85rem; border-radius: 50px; font-size: .75rem; font-weight: 600;
    }
    .badge-live .dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* Pages (tabs) */
    .page { display: none; }
    .page.active { display: block; }

    /* ══════════════════════════════
       CARDS
    ══════════════════════════════ */
    .card {
      background: #1e293b; border: 1px solid rgba(255,255,255,.06);
      border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .card-title {
      font-size: 1rem; font-weight: 700; color: #f1f5f9;
      margin-bottom: 1.25rem; display: flex; align-items: center; gap: .5rem;
    }
    .card-title i { color: #4ade80; }

    /* Form elements */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-full { grid-column: 1 / -1; }

    .f-group { display: flex; flex-direction: column; gap: .35rem; }
    .f-label { font-size: .75rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .04em; }
    .f-input {
      padding: .65rem .9rem; background: #0f172a; border: 1.5px solid #334155;
      border-radius: .6rem; color: #e2e8f0; font-size: .88rem;
      font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .2s, box-shadow .2s;
      width: 100%;
    }
    .f-input:focus { border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,.12); }
    .f-input.textarea { min-height: 90px; resize: vertical; }
    .f-hint { font-size: .72rem; color: #475569; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .65rem 1.25rem; border-radius: .6rem; border: none;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      transition: all .2s; font-family: 'DM Sans', sans-serif;
    }
    .btn-green  { background: #16a34a; color: #fff; box-shadow: 0 3px 10px rgba(22,163,74,.3); }
    .btn-green:hover  { background: #15803d; transform: translateY(-1px); }
    .btn-blue   { background: #2563eb; color: #fff; }
    .btn-blue:hover   { background: #1d4ed8; }
    .btn-red    { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.2); }
    .btn-red:hover    { background: rgba(239,68,68,.25); }
    .btn-ghost  { background: rgba(255,255,255,.05); color: #94a3b8; border: 1px solid rgba(255,255,255,.1); }
    .btn-ghost:hover  { background: rgba(255,255,255,.1); color: #e2e8f0; }
    .btn-sm     { padding: .45rem .9rem; font-size: .78rem; }

    /* Alert / toast */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
      background: #1e293b; border: 1px solid rgba(22,163,74,.3);
      border-left: 4px solid #16a34a;
      color: #4ade80; padding: .85rem 1.25rem; border-radius: .75rem;
      font-size: .85rem; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,.3);
      display: flex; align-items: center; gap: .5rem;
      transform: translateY(100px); opacity: 0;
      transition: all .35s cubic-bezier(.34,1.56,.64,1);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-left-color: #ef4444; color: #f87171; border-color: rgba(239,68,68,.3); }

    /* ══════════════════════════════
       STATS ROW
    ══════════════════════════════ */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card {
      background: #1e293b; border: 1px solid rgba(255,255,255,.06);
      border-radius: .875rem; padding: 1.25rem;
    }
    .stat-icon { width: 36px; height: 36px; border-radius: .5rem; display: flex; align-items: center; justify-content: center; font-size: .9rem; margin-bottom: .75rem; }
    .stat-val  { font-size: 1.6rem; font-weight: 700; color: #f1f5f9; }
    .stat-lbl  { font-size: .75rem; color: #64748b; margin-top: .15rem; }

    /* ══════════════════════════════
       PRODUCT TABLE
    ══════════════════════════════ */
    .table-wrap { overflow-x: auto; border-radius: .75rem; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    thead tr { background: #0f172a; }
    th { padding: .75rem 1rem; text-align: left; font-size: .7rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }
    td { padding: .85rem 1rem; border-top: 1px solid rgba(255,255,255,.04); color: #cbd5e1; }
    tr:hover td { background: rgba(255,255,255,.02); }

    .emoji-cell { font-size: 1.4rem; }
    .badge-cat {
      display: inline-block; padding: .2rem .6rem; border-radius: 50px;
      font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
    }
    .cat-immunity { background: rgba(22,163,74,.15); color: #4ade80; }
    .cat-skin     { background: rgba(249,168,212,.15); color: #f9a8d4; }
    .cat-hair     { background: rgba(139,92,246,.15); color: #c4b5fd; }
    .cat-tea      { background: rgba(251,191,36,.15); color: #fbbf24; }
    .cat-digestive{ background: rgba(34,211,238,.15); color: #22d3ee; }
    .cat-oils     { background: rgba(251,146,60,.15); color: #fb923c; }

    .product-name-cell { font-weight: 600; color: #f1f5f9; max-width: 180px; }

    /* ══════════════════════════════
       PRODUCT FORM (add/edit)
    ══════════════════════════════ */
    .form-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; padding: 1rem;
    }
    .form-overlay.open { display: flex; }
    .form-panel {
      background: #1e293b; border: 1px solid rgba(255,255,255,.08);
      border-radius: 1.25rem; width: 100%; max-width: 680px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 32px 64px rgba(0,0,0,.5);
      animation: slideUp .3s ease;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    .form-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .form-panel-title { font-size: 1rem; font-weight: 700; color: #f1f5f9; }
    .form-panel-body  { padding: 1.5rem; }
    .close-panel-btn {
      width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,.05);
      border: none; color: #94a3b8; cursor: pointer; font-size: .85rem;
      display: flex; align-items: center; justify-content: center; transition: background .2s;
    }
    .close-panel-btn:hover { background: rgba(239,68,68,.15); color: #f87171; }

    /* Array inputs (ingredients/benefits) */
    .array-list { display: flex; flex-direction: column; gap: .4rem; margin-bottom: .5rem; }
    .array-item {
      display: flex; align-items: center; gap: .5rem;
    }
    .array-item .f-input { flex: 1; }
    .btn-remove-item {
      width: 28px; height: 28px; flex-shrink: 0;
      border-radius: 50%; background: rgba(239,68,68,.1); border: none;
      color: #f87171; cursor: pointer; font-size: .75rem;
      display: flex; align-items: center; justify-content: center; transition: background .2s;
    }
    .btn-remove-item:hover { background: rgba(239,68,68,.25); }
    .btn-add-item {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .75rem; color: #4ade80; background: rgba(22,163,74,.1);
      border: 1px dashed rgba(22,163,74,.3); border-radius: .5rem;
      padding: .35rem .75rem; cursor: pointer; transition: all .2s;
    }
    .btn-add-item:hover { background: rgba(22,163,74,.2); }

    /* ══════════════════════════════
       CONFIRM DIALOG
    ══════════════════════════════ */
    .confirm-overlay {
      position: fixed; inset: 0; z-index: 600;
      background: rgba(0,0,0,.7); display: none;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .confirm-overlay.open { display: flex; }
    .confirm-box {
      background: #1e293b; border: 1px solid rgba(255,255,255,.08);
      border-radius: 1rem; padding: 2rem; max-width: 340px; width: 100%;
      text-align: center; box-shadow: 0 16px 48px rgba(0,0,0,.4);
    }
    .confirm-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .confirm-title { font-weight: 700; color: #f1f5f9; margin-bottom: .5rem; }
    .confirm-msg   { font-size: .85rem; color: #94a3b8; margin-bottom: 1.5rem; }
    .confirm-btns  { display: flex; gap: .75rem; justify-content: center; }

    /* ══════════════════════════════
       MOBILE SIDEBAR TOGGLE
    ══════════════════════════════ */
    .mobile-menu-btn {
      display: none; position: fixed; top: 1rem; left: 1rem; z-index: 200;
      width: 40px; height: 40px; border-radius: .5rem; background: #1e293b;
      border: 1px solid rgba(255,255,255,.1); color: #e2e8f0;
      cursor: pointer; align-items: center; justify-content: center;
    }
    .sidebar-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 99;
    }

    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; padding: 1rem; padding-top: 4rem; }
      .mobile-menu-btn { display: flex; }
      .sidebar-overlay.open { display: block; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid.col3 { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .stats-row { grid-template-columns: 1fr; }
    }

    /* ══════════════════════════════
       MISC
    ══════════════════════════════ */
    .section-divider {
      height: 1px; background: rgba(255,255,255,.06); margin: 1.5rem 0;
    }
    .preview-link {
      display: inline-flex; align-items: center; gap: .4rem;
      color: #4ade80; font-size: .8rem; font-weight: 600;
      padding: .4rem .85rem; border-radius: 50px;
      background: rgba(22,163,74,.1); border: 1px solid rgba(22,163,74,.2);
      transition: all .2s;
    }
    .preview-link:hover { background: rgba(22,163,74,.2); }

    .color-preview {
      width: 28px; height: 28px; border-radius: .4rem; border: 2px solid rgba(255,255,255,.1);
      display: inline-block; vertical-align: middle; margin-left: .5rem;
    }

    .pw-strength { height: 4px; border-radius: 2px; margin-top: .4rem; transition: all .3s; }
    .pw-weak   { width: 33%; background: #ef4444; }
    .pw-medium { width: 66%; background: #f59e0b; }
    .pw-strong { width: 100%; background: #22c55e; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🌿</div>
    <div class="login-title">Admin Panel</div>
    <div class="login-sub">AyurLife Naturals — Secure Access</div>

    <div class="inp-group">
      <label class="inp-label">Password</label>
      <div class="inp-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="login-pw" class="inp" placeholder="Enter admin password"
               style="padding-right: 2.5rem" autocomplete="current-password" />
        <button class="toggle-pw" onclick="togglePw('login-pw', this)" tabindex="-1">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" onclick="doLogin()">
      <i class="fa-solid fa-right-to-bracket"></i> Login to Admin
    </button>
    <div class="login-error" id="login-error">❌ Wrong password. Try again.</div>

    <div style="text-align:center; margin-top:1.25rem; font-size:.75rem; color:#475569;">
      🔒 This panel is password protected
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     MOBILE MENU BUTTON
══════════════════════════════════════════ -->
<button class="mobile-menu-btn" onclick="toggleSidebar()" id="mobile-menu-btn">
  <i class="fa-solid fa-bars"></i>
</button>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- ══════════════════════════════════════════
     MAIN ADMIN APP
══════════════════════════════════════════ -->
<div id="admin-app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🌿</div>
      <div>
        <div class="logo-text" id="sb-site-name">AyurLife Naturals</div>
        <div class="logo-sub">Admin Panel</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Overview</div>
        <button class="nav-item active" onclick="showPage('dashboard', this)">
          <i class="fa-solid fa-gauge"></i> Dashboard
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Content</div>
        <button class="nav-item" onclick="showPage('products', this)">
          <i class="fa-solid fa-box-open"></i> Products
        </button>
        <button class="nav-i
